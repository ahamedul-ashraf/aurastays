<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recover Password | Aura Stays</title>
    <meta name="description" content="Forgot your password? Recover your Aura Stays membership account securely. Enter your registered email address.">
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

    <!-- Loader -->
    <div class="loader-overlay" id="page-loader">
        <div class="spinner"></div>
    </div>

    <!-- Main Auth Screen Wrapper -->
    <section class="auth-container">
        <div class="auth-card">
            
            <div class="auth-header">
                <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 1.5rem;">
                    <i class="fas fa-gem" style="color: var(--accent-gold); font-size: 2.2rem;"></i>
                    <h1 style="color: var(--text-main); font-size: 2.2rem;">AURA<span>STAYS</span></h1>
                </a>
                <h2>Recover Password</h2>
                <p>Provide your registered email address, and we'll dispatch a link to reset your password.</p>
            </div>

            <!-- Forgot Password Form -->
            <form id="forgot-password-form">
                <div class="form-group" style="margin-bottom: 2rem;">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="email" placeholder="alexander@luxury.com" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.9rem;">Send Recovery Link</button>
            </form>

            <div class="auth-links" style="margin-top: 2rem;">
                Back to <a href="login.html">Sign In</a>
            </div>
            
        </div>
    </section>

    <!-- Scripts -->
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
