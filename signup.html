<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Account | Aura Stays</title>
    <meta name="description" content="Register your premium Aura Stays account today. Unlock custom room booking rates, saved lists and tailored updates.">
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

    <!-- Loader -->
    <div class="loader-overlay" id="page-loader">
        <div class="spinner"></div>
    </div>

    <!-- Main Auth Screen Wrapper -->
    <section class="auth-container" style="padding: 2rem 0;">
        <div class="auth-card">
            
            <div class="auth-header" style="margin-bottom: 2rem;">
                <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 1.2rem;">
                    <i class="fas fa-gem" style="color: var(--accent-gold); font-size: 2.2rem;"></i>
                    <h1 style="color: var(--text-main); font-size: 2.2rem;">AURA<span>STAYS</span></h1>
                </a>
                <h2>Create Account</h2>
                <p>Register to unlock premium member benefits.</p>
            </div>

            <!-- Signup Form -->
            <form id="signup-form">
                <div class="form-group">
                    <label for="full-name">Full Name</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="full-name" placeholder="Johnathan Sterling" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="email" placeholder="johnathan@sterling.com" required>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="password">Security Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="password" placeholder="••••••••" required>
                        <i class="far fa-eye password-toggle"></i>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 1.8rem;">
                    <label class="checkbox-label" style="text-transform: none; font-weight: 500;">
                        <input type="checkbox" id="agree-terms" required> I agree to the <a href="terms.html" style="color: var(--accent-gold); font-weight: 600;">Terms & Conditions</a> and <a href="privacy.html" style="color: var(--accent-gold); font-weight: 600;">Privacy Policy</a>.
                    </label>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.9rem;">Register Account</button>
            </form>

            <!-- Social Logins -->
            <div class="social-login-title" style="margin: 1.5rem 0;">Or sign up using</div>
            <div class="social-login-btns">
                <button class="social-btn"><i class="fab fa-google" style="color: #DB4437;"></i> Google</button>
                <button class="social-btn"><i class="fab fa-apple"></i> Apple ID</button>
            </div>

            <div class="auth-links" style="margin-top: 1.5rem;">
                Already have an account? <a href="login.html">Sign In</a>
            </div>
            
        </div>
    </section>

    <!-- Scripts -->
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
