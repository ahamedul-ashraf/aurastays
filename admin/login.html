<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Sign In | Aura Stays Console</title>
    <meta name="description" content="Access the administrator control portal. Review pending property approvals, guest transaction logs, and manage system accounts.">
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Stylesheets -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body class="admin-dark-theme" style="background: #110F0E; display: flex; align-items: center; justify-content: center; min-height: 100vh;">

    <!-- Loader -->
    <div class="loader-overlay" id="page-loader">
        <div class="spinner"></div>
    </div>

    <!-- Main Auth Screen Wrapper -->
    <section class="auth-container">
        <div class="auth-card" style="background: #1C1917; border: 1px solid rgba(197, 168, 128, 0.15); box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
            
            <div class="auth-header">
                <a href="../index.html" class="logo" style="justify-content: center; margin-bottom: 1.5rem;">
                    <i class="fas fa-gem" style="color: var(--accent-gold); font-size: 2.2rem;"></i>
                    <h1 style="color: #FFFFFF; font-size: 2.2rem;">AURA<span>STAYS</span></h1>
                </a>
                <h2 style="color: #FFFFFF;">Admin console</h2>
                <p style="color: rgba(255,255,255,0.5);">Enter system admin credentials to access console controls.</p>
            </div>

            <!-- Login Form -->
            <form id="admin-login-form">
                <div class="form-group">
                    <label for="admin-user" style="color: rgba(255,255,255,0.7);">Console Username</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user-shield input-icon" style="color: var(--accent-gold);"></i>
                        <input type="text" id="admin-user" placeholder="admin_director" required style="background: #110F0E; border: 1px solid rgba(197, 168, 128, 0.2); color: #FFFFFF; padding-left: 2.8rem;">
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 2rem;">
                    <label for="admin-pass" style="color: rgba(255,255,255,0.7);">Security Key</label>
                    <div class="input-wrapper">
                        <i class="fas fa-key input-icon" style="color: var(--accent-gold);"></i>
                        <input type="password" id="admin-pass" placeholder="••••••••" required style="background: #110F0E; border: 1px solid rgba(197, 168, 128, 0.2); color: #FFFFFF; padding-left: 2.8rem;">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.9rem;">Access Admin Console</button>
            </form>

            <div class="auth-links" style="margin-top: 2rem;">
                <a href="../index.html" style="color: rgba(255,255,255,0.5); font-weight: 500;"><i class="fas fa-arrow-left" style="font-size: 0.8rem;"></i> Return to Public Site</a>
            </div>
            
        </div>
    </section>

    <!-- Scripts -->
    <script src="../js/app.js"></script>
    <script>
        const adminForm = document.getElementById('admin-login-form');
        if (adminForm) {
            adminForm.addEventListener('submit', (e) => {
                e.preventDefault();
                showToast('Authenticating with secure credentials vault...', 'info');
                setTimeout(() => {
                    showToast('Admin authorized! Initializing control console...', 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1200);
                }, 1500);
            });
        }
    </script>
</body>
</html>
